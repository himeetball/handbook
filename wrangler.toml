name = "meetballhandbook"
compatibility_date = "2024-09-25"
pages_build_output_dir = "public"

# Build command is set in Cloudflare Pages dashboard, not here
# command is: `zola build`

# Production environment
[env.production]
# Add your Cloudflare account ID here
# account_id = "your-account-id-here"

[env.production.vars]
ZOLA_VERSION = "0.22.1"
UNSTABLE_PRE_BUILD = "asdf plugin add zola https://github.com/salasrod/asdf-zola || true && asdf install zola 0.22.1 && asdf global zola 0.22.1"

# Development configuration
[env.preview]
# Preview environment settings can go here

[env.preview.vars]
ZOLA_VERSION = "0.22.1"
UNSTABLE_PRE_BUILD = "asdf plugin add zola https://github.com/salasrod/asdf-zola || true && asdf install zola 0.22.1 && asdf global zola 0.22.1"

# Headers and redirects are supported via _headers and _redirects files
# These files are located in static/ and get copied to public/ during build
# Cloudflare Pages automatically picks them up from the build output

# Using server-base relative paths (/) in config.toml
# This allows the site to work on any domain without URL rewriting
