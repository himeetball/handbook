<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetball: Product Strategy & Roadmap Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chart-container { 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            height: 300px; 
            max-height: 400px; 
        }
        /* Custom Scrollbar for internal panels */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Mock Phone Frame */
        .phone-frame {
            border: 12px solid #1e293b;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 20px;
            background: #1e293b;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 20;
        }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <!-- Chosen Palette: Slate & Indigo (Professional, Structural) with Amber accents (Action/Help) -->
    <!-- Application Structure Plan: 
         1. Hero & Navigation: Sets the vision and allows switching between the three product phases (v0.1, v0.5, v1.0).
         2. Dynamic Dashboard: The central content area changes based on the selected phase.
            - Overview: High-level roadmap and timeline.
            - v0.1 (POC): Focuses on the "Help Loop" mechanic and completed status.
            - v0.5 (Spaces): Focuses on the new Architecture, Native transition, and specific UI Design Requirements (Mock Phone).
            - v1.0 (AI): Focuses on the Matching Algorithm inputs/outputs.
         3. Interactive Simulations: 
            - v0.1: Clickable "Help Loop" demo.
            - v0.5: Clickable "Mobile App" prototype to demonstrate the 3-tab requirement.
    -->
    <!-- Visualization & Content Choices:
         - Roadmap: Gantt-style timeline (HTML/Grid) to show overlap and sequence.
         - Metrics: Chart.js Line chart to visualize the expected impact of each phase on user growth/engagement.
         - Flowcharts: HTML Flexbox diagrams for the "Help Loop" and "AI Logic" (No SVG).
         - UI Mockup: CSS-styled "Phone" container to strictly visualize the v0.5 design requirements.
         - Justification: These methods allow the user to mentally "test" the product logic without needing complex external assets.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-800">

    <!-- Top Navigation / Hero -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-lg">M</div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Meetball <span class="text-slate-400 font-normal text-sm ml-2">Product Strategy</span></h1>
                </div>
                <nav class="hidden md:flex space-x-1 bg-slate-100 p-1 rounded-lg" id="nav-container">
                    <!-- Nav generated by JS -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen">
        
        <!-- Context Header (Dynamic) -->
        <div id="section-header" class="mb-8 fade-in">
            <!-- Populated by JS -->
        </div>

        <!-- Dynamic Content Grid -->
        <div id="content-area" class="grid grid-cols-1 lg:grid-cols-12 gap-8 fade-in">
            <!-- Populated by JS -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 mt-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="mb-2">Meetball Product Documentation Suite</p>
            <p class="text-xs text-slate-500">Generated from Source Report: meetball_product_suite.md</p>
        </div>
    </footer>

    <script>
        // --- DATA STORE ---
        const appData = {
            currentTab: 'overview',
            phases: {
                overview: {
                    title: "Strategic Overview",
                    subtitle: "From Market Validation to AI-Driven Scale",
                    description: "Meetball is bridging the gap between 'needing help' and 'offering value' for entrepreneurs and creators. This dashboard outlines the journey from our initial Proof of Concept (v0.1) to our upcoming Spaces expansion (v0.5) and future AI capabilities (v1.0).",
                    timeline: [
                        { phase: "v0.1 (POC)", status: "Completed", date: "Q4 2024", color: "bg-emerald-500", width: "100%", desc: "Validation" },
                        { phase: "v0.5 (Spaces)", status: "In Progress", date: "Feb - Apr 15", color: "bg-amber-500", width: "40%", desc: "Acquisition" },
                        { phase: "v1.0 (AI)", status: "Planned", date: "Late April+", color: "bg-indigo-500", width: "0%", desc: "Intelligence" }
                    ]
                },
                v01: {
                    title: "Phase 1: v0.1-alpha (POC)",
                    subtitle: "Validation of the 'Help Loop'",
                    status: "Completed ✅",
                    badge: "bg-emerald-100 text-emerald-800",
                    description: "The Alpha version was a Progressive Web App (PWA) designed to test human behavior: Are users willing to publicly ask for help? This phase is now complete and validated.",
                    features: [
                        "User Identity & LinkedIn Integration",
                        "Global Event List & RSVP",
                        "The 'Help Loop' (Questions/Me Too)",
                        "1-to-1 Chat Initiation"
                    ]
                },
                v05: {
                    title: "Phase 2: v0.5 (Spaces)",
                    subtitle: "Segregation, Native Mobile & Retention",
                    status: "Current Focus 🚀",
                    badge: "bg-amber-100 text-amber-800",
                    description: "The critical pivot from a global feed to interest-based 'Spaces'. We are transitioning to Native Mobile (Capacitor) to leverage Push Notifications for retention.",
                    timeline: "Feb 10 – Apr 15",
                    requirements: [
                        "Native Mobile Wrapper (Capacitor)",
                        "Push Notifications (Firebase)",
                        "Space-Centric Architecture",
                        "Meetverse 1.0 (Aggregated Feed)"
                    ]
                },
                v10: {
                    title: "Phase 3: v1.0 (AI Scaling)",
                    subtitle: "Intelligence & Matchmaking",
                    status: "Planned 🗓️",
                    badge: "bg-indigo-100 text-indigo-800",
                    description: "Moving from passive discovery to active matchmaking. AI analyzes behavior to suggest 3-5 high-relevance connections daily.",
                    features: [
                        "AI Matching Algorithm",
                        "Proactive 'Match Cards'",
                        "Feed Re-ranking",
                        "Automated Icebreakers"
                    ]
                }
            }
        };

        // --- STATE MANAGEMENT ---
        let state = {
            activeTab: 'overview',
            mockPhoneTab: 'questions', // questions, events, members
            v01HelpStep: 0, // 0: Start, 1: Question, 2: Reaction, 3: Chat
            chartInstance: null
        };

        // --- DOM ELEMENTS ---
        const navContainer = document.getElementById('nav-container');
        const sectionHeader = document.getElementById('section-header');
        const contentArea = document.getElementById('content-area');

        // --- RENDER FUNCTIONS ---

        function renderNav() {
            const tabs = [
                { id: 'overview', label: 'Overview' },
                { id: 'v01', label: 'v0.1 POC' },
                { id: 'v05', label: 'v0.5 Spaces' },
                { id: 'v10', label: 'v1.0 AI' }
            ];

            navContainer.innerHTML = tabs.map(tab => `
                <button 
                    onclick="switchTab('${tab.id}')"
                    class="px-4 py-2 text-sm font-medium rounded-md transition-colors duration-200 ${
                        state.activeTab === tab.id 
                        ? 'bg-white text-indigo-600 shadow-sm' 
                        : 'text-slate-500 hover:text-slate-900'
                    }"
                >
                    ${tab.label}
                </button>
            `).join('');
        }

        function renderHeader() {
            const data = appData.phases[state.activeTab];
            sectionHeader.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                    <div class="max-w-3xl">
                        <div class="flex items-center gap-3 mb-2">
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                            ${data.badge ? `<span class="px-3 py-1 rounded-full text-xs font-semibold ${data.badge}">${data.status}</span>` : ''}
                        </div>
                        <p class="text-lg text-slate-500 font-medium">${data.subtitle}</p>
                        <p class="mt-4 text-slate-600 leading-relaxed max-w-2xl">${data.description}</p>
                    </div>
                    ${state.activeTab === 'v05' ? `
                        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 max-w-xs">
                            <h4 class="text-amber-800 font-bold text-sm uppercase tracking-wide mb-1">Timeline</h4>
                            <p class="text-amber-900 font-mono font-bold text-xl">Feb 28 - Apr 15</p>
                            <p class="text-amber-700 text-xs mt-1">Critical Milestone</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderContent() {
            contentArea.innerHTML = ''; // Clear content
            contentArea.className = "grid grid-cols-1 lg:grid-cols-12 gap-8 fade-in"; // Reset classes

            if (state.activeTab === 'overview') renderOverview();
            else if (state.activeTab === 'v01') renderV01();
            else if (state.activeTab === 'v05') renderV05();
            else if (state.activeTab === 'v10') renderV10();
        }

        // --- VIEW: OVERVIEW ---
        function renderOverview() {
            contentArea.innerHTML = `
                <!-- Roadmap Visualizer -->
                <div class="lg:col-span-8 space-y-8">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-bold text-slate-900 mb-6">Strategic Roadmap</h3>
                        <div class="space-y-6">
                            ${appData.phases.overview.timeline.map((item, idx) => `
                                <div class="relative">
                                    <div class="flex justify-between text-sm font-medium text-slate-700 mb-2">
                                        <span class="flex items-center gap-2">
                                            <span class="w-3 h-3 rounded-full ${item.color}"></span>
                                            ${item.phase}
                                        </span>
                                        <span>${item.date}</span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden relative">
                                        <div class="${item.color} h-full rounded-full transition-all duration-1000" style="width: ${item.width}"></div>
                                    </div>
                                    <p class="text-xs text-slate-500 mt-1">${item.desc} &bull; ${item.status}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-bold text-slate-900 mb-4">Projected User Engagement</h3>
                        <p class="text-sm text-slate-500 mb-4">Impact of introducing Spaces (v0.5) and AI Matching (v1.0)</p>
                        <div class="chart-container">
                            <canvas id="growthChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Key Metrics / Goals -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-indigo-50 rounded-xl p-6 border border-indigo-100">
                        <h3 class="text-indigo-900 font-bold mb-2">Project Vision</h3>
                        <p class="text-indigo-700 text-sm">To bridge the gap between "needing help" and "offering value" through event-driven, community-centric networking.</p>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-slate-900 font-bold mb-4">Current Status: v0.5</h3>
                        <ul class="space-y-3">
                            <li class="flex items-start gap-3">
                                <span class="text-emerald-500 mt-1">✓</span>
                                <span class="text-sm text-slate-600">v0.1 Market POC Validated</span>
                            </li>
                            <li class="flex items-start gap-3">
                                <span class="text-amber-500 mt-1">➜</span>
                                <span class="text-sm text-slate-600 font-semibold">Developing Spaces Architecture</span>
                            </li>
                            <li class="flex items-start gap-3">
                                <span class="text-slate-300 mt-1">○</span>
                                <span class="text-sm text-slate-400">AI Logic Definition</span>
                            </li>
                        </ul>
                        <button onclick="switchTab('v05')" class="w-full mt-6 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium py-2 rounded-lg transition-colors">
                            View Current Sprint Details
                        </button>
                    </div>
                </div>
            `;
            initChart();
        }

        // --- VIEW: V0.1 POC ---
        function renderV01() {
            contentArea.innerHTML = `
                <div class="lg:col-span-6 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h3 class="text-lg font-bold text-slate-900 mb-4">The "Help Loop" Mechanic</h3>
                    <p class="text-sm text-slate-500 mb-6">Interactive demo of the core POC value proposition.</p>
                    
                    <div class="border border-slate-200 rounded-lg p-6 bg-slate-50 text-center space-y-6">
                        <!-- Step 1: Question -->
                        <div class="transition-all duration-300 ${state.v01HelpStep >= 0 ? 'opacity-100 transform translate-y-0' : 'opacity-30'}">
                            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm max-w-xs mx-auto relative">
                                <div class="text-xs text-slate-400 text-left mb-1">User A asks:</div>
                                <div class="font-medium text-slate-800">"How do I price my first NFT?"</div>
                                <div class="mt-2 flex gap-2 justify-center">
                                    <button onclick="triggerV01Step(1)" class="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded text-slate-600">
                                        ${state.v01HelpStep > 0 ? '👍 Me Too (1)' : '✋ Me Too'}
                                    </button>
                                </div>
                            </div>
                            ${state.v01HelpStep === 0 ? '<div class="mt-2 text-xs text-indigo-600 animate-bounce">Click "Me Too"</div>' : ''}
                        </div>

                        <!-- Arrow -->
                        <div class="text-slate-300 text-2xl ${state.v01HelpStep >= 1 ? 'text-indigo-500' : ''}">↓</div>

                        <!-- Step 2: Helper -->
                        <div class="transition-all duration-300 ${state.v01HelpStep >= 1 ? 'opacity-100 transform translate-y-0' : 'opacity-30'}">
                            <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100 max-w-xs mx-auto">
                                <div class="text-xs text-indigo-400 text-left mb-1">User B sees post:</div>
                                <button onclick="triggerV01Step(2)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2 rounded shadow-sm">
                                    I Can Help
                                </button>
                            </div>
                            ${state.v01HelpStep === 1 ? '<div class="mt-2 text-xs text-indigo-600 animate-bounce">Click "I Can Help"</div>' : ''}
                        </div>

                        <!-- Arrow -->
                        <div class="text-slate-300 text-2xl ${state.v01HelpStep >= 2 ? 'text-indigo-500' : ''}">↓</div>

                        <!-- Step 3: Result -->
                        <div class="transition-all duration-300 ${state.v01HelpStep >= 2 ? 'opacity-100 transform translate-y-0' : 'opacity-30'}">
                            <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-100 max-w-xs mx-auto flex items-center gap-3">
                                <div class="bg-emerald-200 text-emerald-800 rounded-full w-8 h-8 flex items-center justify-center text-sm">💬</div>
                                <div class="text-sm text-emerald-900 font-medium">1-to-1 Chat Opened</div>
                            </div>
                            <div class="mt-2 text-xs text-slate-500">Liquidity Achieved</div>
                            <button onclick="triggerV01Step(0)" class="mt-4 text-xs text-slate-400 underline">Reset Demo</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-6 space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-bold text-slate-900 mb-4">Completed Features</h3>
                        <ul class="space-y-3">
                            ${appData.phases.v01.features.map(f => `
                                <li class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                    <div class="w-5 h-5 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs font-bold">✓</div>
                                    <span class="text-sm text-slate-700">${f}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        // --- VIEW: V0.5 SPACES ---
        function renderV05() {
            // Content for the Mock Phone Tabs
            const mockContent = {
                questions: `
                    <div class="space-y-3 p-3 animate-fade-in">
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-xs font-bold text-slate-800">Jane D.</span>
                                <span class="text-[10px] text-slate-400">2h ago</span>
                            </div>
                            <p class="text-sm text-slate-700 mb-2">Has anyone deployed a smart contract on Polygon?</p>
                            <div class="flex gap-2">
                                <span class="bg-slate-100 text-slate-600 text-[10px] px-2 py-1 rounded">✋ 3 Me too</span>
                                <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded font-bold">Help</span>
                            </div>
                        </div>
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-xs font-bold text-slate-800">Mark S.</span>
                                <span class="text-[10px] text-slate-400">5h ago</span>
                            </div>
                            <p class="text-sm text-slate-700 mb-2">Looking for a co-founder for a Fintech app.</p>
                            <div class="flex gap-2">
                                <span class="bg-slate-100 text-slate-600 text-[10px] px-2 py-1 rounded">✋ 0 Me too</span>
                                <span class="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded font-bold">Help</span>
                            </div>
                        </div>
                    </div>
                `,
                events: `
                    <div class="space-y-3 p-3 animate-fade-in">
                        <div class="bg-white rounded-lg shadow-sm border border-slate-100 overflow-hidden">
                            <div class="h-20 bg-amber-100 flex items-center justify-center text-amber-500 font-bold text-xs">Event Image</div>
                            <div class="p-3">
                                <div class="text-xs text-indigo-600 font-bold mb-1">FEB 28 • 18:00</div>
                                <h4 class="text-sm font-bold text-slate-800">Web3 Founders Mixer</h4>
                                <p class="text-xs text-slate-500 mt-1">London, UK</p>
                                <button class="w-full mt-2 bg-slate-900 text-white text-[10px] py-1.5 rounded">RSVP</button>
                            </div>
                        </div>
                         <div class="bg-white rounded-lg shadow-sm border border-slate-100 overflow-hidden">
                            <div class="p-3 flex justify-between items-center">
                                <div>
                                    <div class="text-xs text-indigo-600 font-bold">MAR 05</div>
                                    <h4 class="text-sm font-bold text-slate-800">Pitch Practice</h4>
                                </div>
                                <button class="bg-slate-100 text-slate-600 text-[10px] px-3 py-1.5 rounded">Join</button>
                            </div>
                        </div>
                    </div>
                `,
                members: `
                    <div class="p-3 space-y-2 animate-fade-in">
                        <div class="bg-white p-2 rounded-lg border border-slate-100 flex items-center gap-3">
                            <div class="w-8 h-8 bg-slate-200 rounded-full"></div>
                            <div>
                                <div class="text-xs font-bold text-slate-800">Sarah Connor</div>
                                <div class="text-[10px] text-slate-400">Product Designer</div>
                            </div>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-100 flex items-center gap-3">
                            <div class="w-8 h-8 bg-slate-200 rounded-full"></div>
                            <div>
                                <div class="text-xs font-bold text-slate-800">John Smith</div>
                                <div class="text-[10px] text-slate-400">Developer</div>
                            </div>
                        </div>
                         <div class="bg-white p-2 rounded-lg border border-slate-100 flex items-center gap-3">
                            <div class="w-8 h-8 bg-slate-200 rounded-full"></div>
                            <div>
                                <div class="text-xs font-bold text-slate-800">Alice W.</div>
                                <div class="text-[10px] text-slate-400">Investor</div>
                            </div>
                        </div>
                    </div>
                `
            };

            contentArea.innerHTML = `
                <!-- Left: Requirements & Technical -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-amber-50 rounded-xl p-6 border border-amber-100">
                         <h3 class="text-amber-900 font-bold mb-2">Native Mobile Transition</h3>
                         <p class="text-sm text-amber-800 mb-4">Moving from PWA to Capacitor Wrapper to enable Push Notifications.</p>
                         <div class="flex gap-4">
                            <div class="bg-white px-4 py-2 rounded shadow-sm text-xs font-bold text-slate-600 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-red-500"></span> FCM (Firebase)
                            </div>
                            <div class="bg-white px-4 py-2 rounded shadow-sm text-xs font-bold text-slate-600 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-blue-500"></span> Deep Linking
                            </div>
                            <div class="bg-white px-4 py-2 rounded shadow-sm text-xs font-bold text-slate-600 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-green-500"></span> Re-engagement
                            </div>
                         </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-bold text-slate-900 mb-4">Design Requirements (Simplified)</h3>
                        <p class="text-sm text-slate-500 mb-4">Strict adherence to "No Frills". The interactive prototype on the right demonstrates the required 3-tab structure.</p>
                        
                        <div class="space-y-4">
                            <div class="border-l-4 border-indigo-500 pl-4 py-1">
                                <h4 class="font-bold text-sm text-slate-800">Space Creation Flow</h4>
                                <p class="text-xs text-slate-500">One step only: Name, Description, Picture.</p>
                            </div>
                            <div class="border-l-4 border-indigo-500 pl-4 py-1">
                                <h4 class="font-bold text-sm text-slate-800">Contextual Posting</h4>
                                <p class="text-xs text-slate-500">
                                    • Global -> Meetverse Feed<br>
                                    • Inside Space -> Tagged with Space<br>
                                    • Inside Event -> Tagged with Event
                                </p>
                            </div>
                            <div class="border-l-4 border-indigo-500 pl-4 py-1">
                                <h4 class="font-bold text-sm text-slate-800">Navigation</h4>
                                <p class="text-xs text-slate-500">Discover Spaces (Root) + Profile "Joined Spaces" list.</p>
                            </div>
                        </div>

        // --- INTERACTION HANDLERS ---

        function switchTab(tabId) {

            state.v01HelpStep = step;

        // --- CHART CONFIG ---
        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            // Destroy existing chart if present
            if (state.chartInstance) {
                state.chartInstance.destroy();
            }

            state.chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Q4 2024 (v0.1)', 'Jan 2025', 'Feb 2025 (Start v0.5)', 'Mar 2025', 'Apr 2025 (Launch v0.5)', 'May 2025 (v1.0 AI)', 'Jun 2025'],

                        label: 'Projected Daily Active Users (DAU)',
                        data: [50, 65, 80, 120, 300, 800, 2500],
                        borderColor: '#4f46e5', // Indigo 600
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
