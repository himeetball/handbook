{% if id %}
<div class="youtube-wrapper" data-youtube-id="{{ id }}">
  <div class="youtube-placeholder" onclick="loadYouTubeVideo(this, '{{ id }}')">
    <img src="https://img.youtube.com/vi/{{ id }}/maxresdefault.jpg" 
         alt="YouTube video thumbnail" 
         loading="lazy"
         onerror="this.src='https://img.youtube.com/vi/{{ id }}/hqdefault.jpg'">
    <button class="youtube-play-button" aria-label="Play video">
      <svg viewBox="0 0 68 48" style="width: 68px; height: 48px;">
        <path d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#f00"></path>
        <path d="M 45,24 27,14 27,34" fill="#fff"></path>
      </svg>
    </button>
  </div>
</div>

<style>
  .youtube-wrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
    max-width: 100%;
    min-width: 400px;
    margin: 0;
    border-radius: 12px;
    background: #000;
    isolation: isolate;
  }
  
  .youtube-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .youtube-placeholder img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }
  
  .youtube-play-button {
    position: relative;
    z-index: 1;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  
  .youtube-play-button:hover {
    transform: scale(1.1);
  }
  
  .youtube-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    border-radius: 12px;
    clip-path: inset(0 round 12px);
  }
</style>

<script>
function loadYouTubeVideo(element, videoId) {
  const wrapper = element.parentElement;
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?rel=0&autoplay=1`;
  iframe.title = 'YouTube video player';
  iframe.frameBorder = '0';
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
  iframe.allowFullscreen = true;
  
  // Replace placeholder with iframe
  wrapper.innerHTML = '';
  wrapper.appendChild(iframe);
}
</script>
{% endif %}
