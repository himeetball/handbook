<div class="youtube-embed" style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; isolation: isolate;">
  <iframe 
    src="https://www.youtube.com/embed/{{ id }}"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; clip-path: inset(0 0 0 0 round 12px);"
    frameborder="0"
    allowfullscreen
    title="YouTube video">
  </iframe>
</div>

<style>
.youtube-embed {
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
}
</style>
